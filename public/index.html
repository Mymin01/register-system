<!DOCTYPE html>
<html>
<head>
  <title>สมัครสมาชิก</title>
  <style>
    body { font-family: sans-serif; text-align:center; }
    input { margin:10px; padding:10px; width:80%; }
    button { padding:10px 20px; }
  </style>
</head>
<body>

<h2>📋 สมัครสมาชิก</h2>

<input id="name" placeholder="ชื่อเล่น"><br>
<input id="age" placeholder="อายุ"><br>
<input id="reason" placeholder="คุณเข้ามาที่นี่เพราะอะไร"><br>

<button onclick="send()">ส่งข้อมูล</button>

<script>
function send(){
  fetch('/submit',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      name:document.getElementById('name').value,
      age:document.getElementById('age').value,
      reason:document.getElementById('reason').value
    })
  }).then(()=>alert("สมัครเรียบร้อย!"));
}
</script>

</body>
</html>
